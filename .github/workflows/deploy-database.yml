name: Deploy production database

on:
  workflow_dispatch:

concurrency:
  group: production-database
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    name: Verify and apply migrations
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Preload pg_prove image
        run: |
          for attempt in 1 2 3; do
            docker pull public.ecr.aws/supabase/pg_prove:3.36 && exit 0
            sleep $((attempt * 10))
          done
          docker pull public.ecr.aws/supabase/pg_prove:3.36
      - run: pnpm db:start:ci
      - run: pnpm db:verify
      - name: Link production project
        run: pnpm exec supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"
      - name: Review migration plan
        run: pnpm exec supabase db push --dry-run
      - name: Apply migrations
        run: pnpm exec supabase db push
