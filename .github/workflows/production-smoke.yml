name: Production smoke

on:
  workflow_dispatch:
    inputs:
      production_url:
        description: Deployed Relay URL
        required: true
        type: string
  deployment_status:

concurrency:
  group: production-smoke
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production')
    runs-on: ubuntu-latest
    environment: production
    env:
      PRODUCTION_URL: ${{ inputs.production_url || github.event.deployment_status.environment_url }}
      PRODUCTION_SMOKE_EMAIL: ${{ secrets.PRODUCTION_SMOKE_EMAIL }}
      PRODUCTION_SMOKE_PASSWORD: ${{ secrets.PRODUCTION_SMOKE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:smoke:production
